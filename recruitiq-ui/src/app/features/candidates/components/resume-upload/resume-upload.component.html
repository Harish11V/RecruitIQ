<div 
  class="upload-dropzone" 
  [class.drag-over]="isDragOver()" 
  [class.uploading]="isUploading"
  (dragover)="onDragOver($event)" 
  (dragleave)="onDragLeave($event)" 
  (drop)="onDrop($event)"
  (click)="triggerFileBrowse()">

  <input 
    #fileInput 
    type="file" 
    accept=".pdf,.doc,.docx" 
    class="hidden-file-input" 
    (change)="onFileSelected($event)">

  @if (isUploading) {
    <div class="upload-loader d-flex flex-column align-center justify-center gap-3 p-4">
      <mat-spinner diameter="40" color="primary"></mat-spinner>
      <span class="loader-text text-medium">Uploading Resume... {{ uploadProgress }}%</span>
      <mat-progress-bar mode="determinate" [value]="uploadProgress" class="progress-bar mt-2"></mat-progress-bar>
    </div>
  } @else {
    <div class="upload-placeholder d-flex flex-column align-center justify-center gap-2 p-6">
      <div class="placeholder-icon-wrapper d-flex align-center justify-center">
        <mat-icon class="material-symbols-rounded">cloud_upload</mat-icon>
      </div>
      <span class="placeholder-title text-semibold font-16">{{ placeholderText }}</span>
      <span class="placeholder-formats text-muted font-12">{{ supportedFormats }}</span>
      <span class="placeholder-hint text-primary font-semibold mt-2">Drag & Drop or Click to Browse</span>
    </div>
  }

  @if (errorMessage()) {
    <div class="upload-error-message d-flex align-center gap-2 mt-3 p-3" (click)="$event.stopPropagation()">
      <mat-icon class="material-symbols-rounded text-danger">error</mat-icon>
      <span class="font-12">{{ errorMessage() }}</span>
    </div>
  }
</div>
